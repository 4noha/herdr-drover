# herdr-drover — cloud sync plugin for herdr
# marketplace 掲載: GitHub topic `herdr-plugin` を付与するだけ（無審査・約30分毎索引）
id = "4noha.drover"
name = "herdr-drover"
version = "0.1.0"
min_herdr_version = "0.7.4"
description = "Cloud session sync: view and control your herdr sessions from any PC, browser, or phone"
# platforms 省略は link 時に警告『manifest does not declare platforms』（herdr 0.7.4
# 実測）＝明示する。Windows は out-of-scope（DESIGN: direct attach 非対応）。
# linux は agent/status/nudge が動く（常駐化は launchd 相当を手動整備）。
platforms = ["macos", "linux"]

# [[build]] は GitHub `herdr plugin install` 時のみ実行される（`plugin link` では
# 走らない・実測）。cwd=checkout の manifest_root・HERDR_* runtime env は scrub
# 済み（素のユーザ環境）・失敗すると install 中止。
# ⚠ build が herdr-plugin.toml を書き換えると preview 不一致で install 中止になる
# ため、build.sh は bin/ 以外に書かない。
[[build]]
command = ["sh", "scripts/build.sh"]

# install は launchd 登録＝macOS のみ（項目 platforms がトップレベルを上書き）。
# 常駐本体は launchd: herdr プラグイン機構は常駐不可（hook/action=一発 spawn・
# stdout/stderr 64KB cap・supervision 無し＝実測）。
[[actions]]
id = "install"
title = "Install herdr-drover (daemon + launchd)"
platforms = ["macos"]
command = ["sh", "scripts/install-action.sh"]

[[actions]]
id = "status"
title = "Show drover daemon / cloud sync status"
command = ["bin/herdr-drover", "status"]

[[actions]]
id = "nudge"
title = "Nudge drover daemon (immediate re-scan)"
command = ["bin/herdr-drover", "nudge"]

# Tab を別 Workspace へ丸ごと引っ越し（TODO.md 3.5）。plugin action は非 TTY spawn
# （実測済・stdin/stdout/stderr すべて非 TTY）＝action 内で対話ピッカ不可のため、
# launcher が新 Tab を layout.apply で開き（focus:true）その TTY 内で `herdr-drover
# mv-tab` を対話モードで走らせる。合成手順は pane.layout→pane.move new_tab→
# pane.move tab で残り pane 再構築、空 Tab は herdr が自動 close（実測）。
# 成功後は workspace.focus + tab.focus で新 Tab へ自動フォーカス。
[[actions]]
id = "mv-tab"
title = "Move Tab to another Workspace..."
command = ["bin/herdr-drover", "mv-tab-launch"]

# events は常駐不可のため nudge（SIGUSR1 → daemon 即時 re-scan）専用。
# 発火は合図でしかなく差分の権威ではない（周期 poll backstop が daemon 側に常設）。
# 網羅の根拠（herdr 0.7.4 実測）:
#   - pane.created は workspace create の root pane でも発火する（作成系はこれで足りる）
#   - pane.closed は `pane close` では発火するが **`workspace close` では発火しない**
#     （実測の穴）＝ workspace.closed / tab.closed / pane.exited も購読して消滅を取りこぼさない
[[events]]
on = "pane.created"
command = ["bin/herdr-drover", "nudge"]

[[events]]
on = "pane.closed"
command = ["bin/herdr-drover", "nudge"]

[[events]]
on = "pane.exited"
command = ["bin/herdr-drover", "nudge"]

[[events]]
on = "pane.agent_status_changed"
command = ["bin/herdr-drover", "nudge"]

[[events]]
on = "tab.closed"
command = ["bin/herdr-drover", "nudge"]

[[events]]
on = "workspace.closed"
command = ["bin/herdr-drover", "nudge"]
